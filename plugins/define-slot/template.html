<div class="dslot-wrap">

  <div class="dslot-header">
    <svg class="dslot-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 4h7a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H4V4z" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M20 4h-7a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h8V4z" stroke="rgba(255,255,255,0.8)" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <span class="dslot-header-label">Dictionary</span>
  </div>

  <div class="dslot-word-row">
    <span class="dslot-word">{{word}}</span>
    <span class="dslot-phonetic">{{phonetic}}</span>
    {{audio_btn}}
  </div>

  <div class="dslot-divider"></div>

  <div class="dslot-section">
    <div class="dslot-section-label">Definitions</div>
    <div class="dslot-defs">{{definitions}}</div>
  </div>

  <div class="dslot-grid">
    <div class="dslot-tags-box">
      <div class="dslot-section-label">Synonyms</div>
      <div class="dslot-tags">{{synonyms}}</div>
    </div>
    <div class="dslot-tags-box">
      <div class="dslot-section-label">Antonyms</div>
      <div class="dslot-tags">{{antonyms}}</div>
    </div>
  </div>

  {{etymology}}

</div>
